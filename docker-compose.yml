services:
  postgres:
    image: postgres:16-alpine
    container_name: quiz_platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quiz_platform}
      POSTGRES_USER: ${POSTGRES_USER:-quiz_platform_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quiz_platform_user} -d ${POSTGRES_DB:-quiz_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: quiz_platform_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quiz_platform_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-quiz_platform}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/api:/app

  vk-bot:
    build:
      context: ./services/vk-bot
      dockerfile: Dockerfile
    container_name: quiz_platform_vk_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
